<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,
               user-scalable=no,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>GPS Speedometer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --accent: #00e5ff;
      --accent-dim: rgba(0,229,255,0.15);
      --red: #ff3b5c;
      --green: #00e676;
      --amber: #ffb300;
      --blue: #448aff;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
    }

    * { -webkit-tap-highlight-color: transparent; }

    body { font-family: 'Inter', sans-serif; background: #050508; }

    /* ── Gauge ── */
    .gauge-wrap {
      width: min(80vw, 80vh, 340px);
      height: min(80vw, 80vh, 340px);
    }
    @media (orientation: landscape) {
      .gauge-wrap { width: min(60vh, 300px); height: min(60vh, 300px); }
    }
    .gauge-ring {
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #111118 0%, #050508 70%);
      box-shadow:
        0 0 0 1px var(--border),
        0 0 40px rgba(0,229,255,0.18),
        inset 0 0 60px rgba(0,0,0,0.8);
    }

    /* ── Speed number ── */
    .speed-num {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(3rem, 14vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      color: #fff;
      text-shadow: 0 0 30px rgba(0,229,255,0.5);
    }
    .speed-unit { font-family: 'Inter', sans-serif; font-size: 0.85rem; letter-spacing: 0.15em; }

    /* ── Stat card ── */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .stat-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 2px;
    }
    .stat-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.1;
    }

    /* ── Pill button ── */
    .pill-btn {
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 8px 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: rgba(255,255,255,0.7);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .pill-btn:active { transform: scale(0.96); }
    .pill-btn.danger  { border-color: rgba(255,59,92,0.4); color: var(--red); }
    .pill-btn.danger:hover  { background: rgba(255,59,92,0.15); }
    .pill-btn.primary { border-color: rgba(0,229,255,0.4); color: var(--accent); }
    .pill-btn.primary:hover { background: rgba(0,229,255,0.1); }

    /* ── Drawer ── */
    #historyDrawer {
      background: rgba(5,5,8,0.95);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* ── Toggle chip ── */
    .toggle-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 999px;
      border: 1px solid rgba(68,138,255,0.35);
      background: rgba(68,138,255,0.1);
      color: var(--blue);
      cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .toggle-chip:active { transform: scale(0.95); }

    /* ── GPS dot ── */
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }
    .gps-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green);
               animation: pulse-dot 1.8s ease-in-out infinite; display: inline-block; }
    .gps-dot.off { background: #555; animation: none; }

    /* ── Dialog ── */
    .dialog-box {
      background: #0e0e14;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 24px;
      max-width: 320px;
      width: 100%;
    }

    /* ══════════════════════════════════════
       F1 LED THEME
    ══════════════════════════════════════ */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    body.f1 { background: #0a0a0a; }

    /* hide gauge, show f1 panel */
    body.f1 #gaugeView  { display: none !important; }
    body.f1 #f1View     { display: flex !important; }
    body:not(.f1) #f1View { display: none !important; }

    /* LED digit font */
    .led {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      color: #ff2800;
      text-shadow: 0 0 8px #ff2800, 0 0 20px rgba(255,40,0,0.6);
      line-height: 1;
    }
    .led-dim { color: #1a0500; text-shadow: none; }

    /* F1 bar — RPM-style speed bar */
    .f1-bar-cell {
      width: 18px; height: 10px; border-radius: 2px;
      background: #1a1a1a;
      transition: background 0.1s, box-shadow 0.1s;
    }
    .f1-bar-cell.on-green  { background: #00e676; box-shadow: 0 0 6px #00e676; }
    .f1-bar-cell.on-amber  { background: #ffb300; box-shadow: 0 0 6px #ffb300; }
    .f1-bar-cell.on-red    { background: #ff2800; box-shadow: 0 0 8px #ff2800; }

    /* F1 stat row */
    .f1-stat { border-bottom: 1px solid rgba(255,255,255,0.06); padding: 6px 0; }
    .f1-stat-label { font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .f1-stat-val   { font-family: 'Share Tech Mono', monospace; font-size: 1rem; color: #fff; }

    /* Theme toggle button */
    #themeToggle {
      position: fixed; top: 12px; right: 12px; z-index: 30;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; cursor: pointer;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    #themeToggle:active { transform: scale(0.9); }
  </style>
</head>

<body class="bg-[#050508] text-white overflow-x-hidden select-none">

  <!-- Theme toggle -->
  <button id="themeToggle" title="Switch theme">🏎</button>

  <!-- ────── Main ────── -->
  <main class="flex flex-col landscape:flex-row items-center justify-around min-h-[100dvh] p-4 pb-16 landscape:pb-14 gap-6 landscape:gap-4">

    <!-- Stats column -->
    <div class="flex flex-row landscape:flex-col gap-3 w-full landscape:w-44 landscape:justify-center">

      <!-- Speed stats -->
      <div class="stat-card flex-1 landscape:flex-none space-y-3">
        <div>
          <div class="stat-label">Today Max</div>
          <div id="maxSpeed" class="stat-value" style="color:var(--green)">0 km/h</div>
        </div>
        <div>
          <div class="stat-label">Today Min</div>
          <div id="minSpeed" class="stat-value" style="color:var(--amber)">0 km/h</div>
        </div>
        <div>
          <div class="stat-label">All-time Max</div>
          <div id="allTimeMax" class="stat-value" style="color:var(--accent)">0 km/h</div>
        </div>
      </div>

      <!-- Trip stats -->
      <div class="stat-card flex-1 landscape:flex-none space-y-3">
        <div class="flex items-center justify-between">
          <div class="stat-label">Distance</div>
          <button id="resetDistanceBtn" class="opacity-40 hover:opacity-80 transition-opacity" title="Reset trip">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
          </button>
        </div>
        <div id="tripDistance" class="stat-value" style="color:var(--amber)">0.00 km</div>
        <div>
          <div class="stat-label flex gap-1"><span>Time</span><span class="opacity-50">(Tot/Mov)</span></div>
          <div id="tripTime" class="stat-value mb-3" style="color:var(--accent); font-size: 1.1rem; letter-spacing: 0.05em">0m / 0m</div>
        </div>
        <div>
          <div id="avgLabel" class="toggle-chip mb-1" title="Tap to toggle">
            <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0l-4-4m4 4l-4 4M4 17h8m-8 0l4-4m-4 4l4 4"/>
            </svg>
            <span id="avgLabelText">Moving Avg</span>
          </div>
          <div id="avgSpeed" class="stat-value" style="color:var(--blue)">0 km/h</div>
        </div>
      </div>

    </div>

    <!-- Gauge + controls -->
    <div class="flex flex-col items-center gap-5">

      <!-- GPS status bar -->
      <div class="flex items-center gap-2 text-xs font-semibold tracking-widest uppercase opacity-60">
        <span id="gpsDot" class="gps-dot off"></span>
        <span id="gpsStatus">Acquiring GPS…</span>
      </div>

      <!-- ── GAUGE VIEW ── -->
      <div id="gaugeView" class="flex flex-col items-center gap-5">
        <div class="gauge-wrap gauge-ring relative">
          <svg viewBox="0 0 200 200" class="w-full h-full">
            <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
            <g id="ticks"></g>
            <line id="needleShadow" x1="100" y1="105" x2="100" y2="28"
                  stroke="rgba(0,0,0,0.5)" stroke-width="5" stroke-linecap="round"/>
            <line id="needle" x1="100" y1="105" x2="100" y2="22"
                  stroke="var(--red)" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="100" cy="105" r="6" fill="#1a1a22" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <circle cx="100" cy="105" r="3" fill="var(--red)"/>
          </svg>
          <div class="absolute inset-0 flex flex-col items-center" style="padding-top:18%">
            <div class="flex items-baseline leading-none">
              <div id="currentSpeed" class="speed-num">0</div>
              <div id="currentSpeedDec" class="speed-num" style="font-size:clamp(1.4rem,6vw,2.4rem);opacity:0.5">.0</div>
            </div>
            <div class="speed-unit text-white/30 mt-1">KM/H</div>
          </div>
        </div>
      </div>

      <!-- ── F1 LED VIEW ── -->
      <div id="f1View" class="flex flex-col items-center gap-4 w-full max-w-xs landscape:max-w-sm landscape:pb-14">

        <!-- Speed bar (15 LEDs) -->
        <div id="f1Bar" class="flex gap-1.5 items-end"></div>

        <!-- Big speed number -->
        <div class="relative w-full bg-black border border-red-900/40 rounded-lg px-6 py-4 flex flex-col items-center"
             style="box-shadow:inset 0 0 30px rgba(255,40,0,0.08)">
          <div class="f1-stat-label mb-1">SPEED</div>
          <div id="f1Speed" class="led" style="font-size:clamp(4rem,20vw,7rem)">000</div>
          <div class="led-dim" style="font-size:0.7rem;letter-spacing:0.2em">KM/H</div>
        </div>

        <!-- Stats grid -->
        <div class="w-full grid grid-cols-3 gap-2">
          <div class="bg-black border border-white/5 rounded-lg p-3 text-center">
            <div class="f1-stat-label">MAX</div>
            <div id="f1Max" class="f1-stat-val" style="color:#00e676">0</div>
          </div>
          <div class="bg-black border border-white/5 rounded-lg p-3 text-center">
            <div class="f1-stat-label">DIST</div>
            <div id="f1Dist" class="f1-stat-val" style="color:#ffb300">0.0</div>
          </div>
          <div class="bg-black border border-white/5 rounded-lg p-3 text-center">
            <div class="f1-stat-label">AVG</div>
            <div id="f1Avg" class="f1-stat-val" style="color:#448aff">0</div>
          </div>
        </div>

      </div>

      <!-- Action buttons -->
      <div class="flex gap-3">
        <button id="resetBtn" class="pill-btn danger">Reset Max</button>
        <button id="fullscreenBtn" class="pill-btn primary">Fullscreen</button>
      </div>

    </div>
  </main>

  <!-- ────── History Drawer ────── -->
  <div id="historyDrawer"
       class="fixed bottom-0 left-0 right-0 z-20 flex flex-col overflow-hidden transition-all duration-300 ease-in-out"
       style="max-height:3rem">
    <div id="drawerHeader" class="flex items-center justify-between px-5 py-2 cursor-pointer flex-shrink-0">
      <div class="flex items-center gap-2">
        <svg class="w-3.5 h-3.5 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <span class="text-xs font-bold tracking-widest uppercase opacity-40">History</span>
      </div>
      <svg id="drawerIcon" class="w-4 h-4 opacity-40 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
      </svg>
    </div>
    <div class="px-4 pb-5 overflow-y-auto flex-1">
      <div id="historyList" class="space-y-2 text-sm"></div>
    </div>
  </div>

  <!-- ────── GPS Prompt ────── -->
  <div id="gpsPrompt" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6 hidden">
    <div class="dialog-box text-center">
      <div class="text-3xl mb-3">📡</div>
      <h3 class="text-lg font-bold mb-2">GPS Required</h3>
      <p class="text-white/50 text-sm mb-6 leading-relaxed">Enable location services to measure your speed.</p>
      <button id="requestGpsBtn" class="pill-btn primary w-full justify-center text-sm py-3">Enable GPS</button>
    </div>
  </div>

  <!-- ────── Reset Confirm ────── -->
  <div id="resetConfirm" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6 hidden">
    <div class="dialog-box text-center">
      <h3 id="resetConfirmTitle" class="text-lg font-bold mb-2" style="color:var(--red)">Reset Today?</h3>
      <p id="resetConfirmText" class="text-white/50 text-sm mb-6 leading-relaxed">This will clear max/min for today.</p>
      <div class="flex gap-3">
        <button id="cancelReset" class="pill-btn flex-1 justify-center py-3">Cancel</button>
        <button id="confirmReset" class="pill-btn danger flex-1 justify-center py-3">Reset</button>
      </div>
    </div>
  </div>

  <!-- ────── JavaScript ────── -->
  <script>
    // ======================  Configuration  ======================
    const UNITS = { kmh: 'km/h', mph: 'mph' };
    const DISPLAY_UNITS = UNITS.kmh;                 // switch to UNITS.mph if you want miles
    const UPDATE_INTERVAL_MS = 1000;                  // GPS polling interval
    const IGNORE_SPEED_BELOW = 0.5;                   // filter out noise
    const MAX_NEEDLE_ANGLE = 240;                   // degrees needle sweeps
    const MIN_NEEDLE_ANGLE = -120;                  // starting angle (upward)

    // ======================  State Variables  ======================
    let currentSpeed = 0;
    let maxSpeed = 0;
    let minSpeed = 0;
    let todayKey = new Date().toISOString().slice(0, 10);
    let watchId = null;
    let isGpsActive = false;
    let avgMode = 'moving'; // 'moving' or 'total'

    // Accelerometer state for GPS drift defence
    let accelMag = 0;          // smoothed acceleration magnitude (m/s²)
    const ACCEL_STILL_THRESHOLD = 0.3;  // below this → device is stationary
    const ACCEL_ALPHA = 0.2;            // low-pass filter weight
    // GPS spike rejection
    const MAX_ACCEL_FROM_GPS = 8;       // m/s² — implausible GPS jump threshold
    let lastGpsSpeedMs = 0;             // previous GPS speed in m/s
    let lastGpsTime = 0;                // timestamp of previous GPS fix
    // Sustained motion gate
    const MOTION_CONFIRM_MS = 5000;     // must be moving for this long before speed is shown
    let movingSinceMs = 0;              // timestamp when continuous motion started (0 = not moving)

    // ======================  Element References  ======================
    const currentSpeedEl    = document.getElementById('currentSpeed');
    const currentSpeedDecEl = document.getElementById('currentSpeedDec');
    const maxSpeedEl   = document.getElementById('maxSpeed');
    const minSpeedEl   = document.getElementById('minSpeed');
    const tripDistanceEl = document.getElementById('tripDistance');
    const tripTimeEl     = document.getElementById('tripTime');
    const avgSpeedEl   = document.getElementById('avgSpeed');
    const avgLabel     = document.getElementById('avgLabel');
    const avgLabelText = document.getElementById('avgLabelText');
    const allTimeMaxEl = document.getElementById('allTimeMax');
    const needleEl     = document.getElementById('needle');
    const needleShadow = document.getElementById('needleShadow');
    const gpsDot       = document.getElementById('gpsDot');
    const gpsStatus    = document.getElementById('gpsStatus');
    const ticksContainer = document.getElementById('ticks');
    const historyListEl = document.getElementById('historyList');
    const drawerHeader     = document.getElementById('drawerHeader');
    const drawerIcon       = document.getElementById('drawerIcon');
    const historyDrawer    = document.getElementById('historyDrawer');
    const requestGpsBtn    = document.getElementById('requestGpsBtn');
    const resetBtn         = document.getElementById('resetBtn');
    const resetConfirm     = document.getElementById('resetConfirm');
    const cancelReset      = document.getElementById('cancelReset');
    const confirmReset     = document.getElementById('confirmReset');
    const gpsPrompt        = document.getElementById('gpsPrompt');

    // ======================  Helper Functions  ======================

    // ---- Draw SVG tick marks ----
    const ticksData = [];
    
    function drawTicks() {
      const cx = 100, cy = 100, r = 90;
      const MAX_SPEED_DISPLAY = 140; 
      const RED_ZONE_START = 120;
      
      for (let s = 0; s <= MAX_SPEED_DISPLAY; s += 2) {
        const pct = s / MAX_SPEED_DISPLAY;
        // -90 offset so 0 degrees is 12 o'clock, aligning with SVG rotate origin
        const angleDeg = MIN_NEEDLE_ANGLE + (pct * 240) - 90;
        const rad = (angleDeg * Math.PI) / 180;
        const isMajor = s % 20 === 0;
        const innerR = isMajor ? r - 10 : r - 5;
        const x1 = cx + r * Math.cos(rad);
        const y1 = cy + r * Math.sin(rad);
        const x2 = cx + innerR * Math.cos(rad);
        const y2 = cy + innerR * Math.sin(rad);
        
        const isRedZone = s > RED_ZONE_START;
        
        const tick = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        tick.setAttribute('x1', x1);
        tick.setAttribute('y1', y1);
        tick.setAttribute('x2', x2);
        tick.setAttribute('y2', y2);
        tick.setAttribute('stroke-width', isMajor ? '2' : '1');
        ticksContainer.appendChild(tick);

        let textEl = null;

        if (isMajor) {
          const textR = r - 22; 
          const tx = cx + textR * Math.cos(rad);
          // By adding a tiny offset instead of using dominant-baseline we prevent subpixel blur issues
          const ty = cy + textR * Math.sin(rad) + 4;
          
          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('x', tx);
          text.setAttribute('y', ty);
          text.setAttribute('fill', isRedZone ? '#ef4444' : '#fff');
          text.setAttribute('font-size', '11');
          text.setAttribute('font-family', 'ui-sans-serif, system-ui, sans-serif');
          text.setAttribute('font-weight', '800');
          text.setAttribute('text-anchor', 'middle');
          // Removed dominant-baseline to fix fuzzy subpixel rendering in some webkits, using `ty` offset
          text.textContent = s;
          ticksContainer.appendChild(text);
          textEl = text;
        }
        
        ticksData.push({ s, isMajor, isRedZone, tick, textEl });
      }
    }
    drawTicks();

    // ---- Set needle rotation ----
    function setNeedleAngle(speed) {
      const maxDisplaySpeed = 140;
      const pct = Math.min(Math.max(speed / maxDisplaySpeed, 0), 1);
      const angle = MIN_NEEDLE_ANGLE + pct * MAX_NEEDLE_ANGLE;
      needleEl.setAttribute('transform', `rotate(${angle}, 100, 105)`);
      if (needleShadow) needleShadow.setAttribute('transform', `rotate(${angle}, 100, 105)`);

      // Highlight trail behind needle
      for (const item of ticksData) {
        // slightly ahead tolerance to light up current target smoothly
        const isPassed = item.s <= speed + 1;
        
        // Update tick line colors
        const activeCol = item.isRedZone ? '#ef4444' : '#fff';
        let inactiveCol = item.isMajor ? '#555' : '#222';
        if (item.isRedZone) inactiveCol = '#7f1d1d';
        item.tick.setAttribute('stroke', isPassed ? activeCol : inactiveCol);
        
        // Update text labels opacity & glow
        if (item.textEl) {
          item.textEl.setAttribute('opacity', isPassed ? '1' : '0.4');
          if (isPassed) {
            item.textEl.style.filter = item.isRedZone ? 'drop-shadow(0 0 3px #ef4444)' : 'drop-shadow(0 0 3px #0ea5e9)';
          } else {
            item.textEl.style.filter = 'none';
          }
        }
      }
    }

    // ---- LocalStorage helpers (daily max/min) ----
    function getTodayEntry() {
      const key = `speedometer.${todayKey}`;
      const raw = localStorage.getItem(key);
      const defaultEntry = { maxSpeed: 0, minSpeed: 0, distance: 0, movingTime: 0, totalTime: 0, recordTime: Date.now() };
      if (!raw) return defaultEntry;
      try { return { ...defaultEntry, ...JSON.parse(raw) }; } catch { return defaultEntry; }
    }
    function saveTodayEntry(entry) {
      const key = `speedometer.${todayKey}`;
      entry.date = todayKey;
      entry.recordTime = Date.now();
      localStorage.setItem(key, JSON.stringify(entry));
    }
    function loadHistory() {
      const entries = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('speedometer.')) {
          try { entries.push(JSON.parse(localStorage.getItem(key))); }
          catch { /* ignore */ }
        }
      }
      entries.sort((a, b) => b.date.localeCompare(a.date));
      return entries;
    }

    function getAllTimeMax() {
      let best = 0;
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('speedometer.')) {
          try {
            const e = JSON.parse(localStorage.getItem(key));
            if (e.maxSpeed > best) best = e.maxSpeed;
          } catch { /* ignore */ }
        }
      }
      return best;
    }

    // ---- UI updates ----
    function formatTime(hours) {
      if (!hours) return '0m';
      const h = Math.floor(hours);
      const m = Math.floor((hours - h) * 60);
      if (h > 0) return `${h}h${m}m`;
      return `${m}m`;
    }

    function updateDisplay() {
      const dispSpeed = DISPLAY_UNITS === UNITS.mph ? currentSpeed * 0.621371 : currentSpeed;
      const [intPart, decPart] = dispSpeed.toFixed(1).split('.');
      currentSpeedEl.textContent = intPart;
      if (currentSpeedDecEl) currentSpeedDecEl.textContent = '.' + decPart;

      const fmt = v => (DISPLAY_UNITS === UNITS.mph ? (v * 0.621371).toFixed(1) : v.toFixed(1)) + ' ' + DISPLAY_UNITS;
      maxSpeedEl.textContent = fmt(maxSpeed);
      minSpeedEl.textContent = fmt(minSpeed);

      const entry = getTodayEntry();
      const dist = entry.distance || 0;
      const movTime = entry.movingTime || 0;
      const totTime = entry.totalTime || 0;
      
      const timeToUse = avgMode === 'moving' ? movTime : totTime;
      const avg = timeToUse > 0 ? (dist / timeToUse) : 0;

      const distStr = DISPLAY_UNITS === UNITS.mph ? (dist * 0.621371).toFixed(2) + ' mi' : dist.toFixed(2) + ' km';
      const avgStr = DISPLAY_UNITS === UNITS.mph ? (avg * 0.621371).toFixed(1) : avg.toFixed(1);

      tripDistanceEl.textContent = distStr;
      if (tripTimeEl) tripTimeEl.textContent = `${formatTime(totTime)} / ${formatTime(movTime)}`;
      avgSpeedEl.textContent = avgStr + ' ' + DISPLAY_UNITS;

      const atm = getAllTimeMax();
      allTimeMaxEl.textContent = (DISPLAY_UNITS === UNITS.mph ? (atm * 0.621371).toFixed(1) : atm.toFixed(1))
                               + ' ' + DISPLAY_UNITS;
      setNeedleAngle(dispSpeed);
    }

    function renderHistory() {
      const history = loadHistory();
      const recent = history.slice(0, 7); // show last 7 days
      if (recent.length === 0) {
        historyListEl.innerHTML = '<div class="text-gray-500 text-center py-4">No records yet</div>';
        return;
      }
      historyListEl.innerHTML = recent.map(h => {
        const date = new Date(h.date + 'T00:00:00').toLocaleDateString(undefined,
                         { weekday: 'short', month: 'short', day: 'numeric' });
        const max = DISPLAY_UNITS === UNITS.mph ? (h.maxSpeed * 0.621371).toFixed(1) : h.maxSpeed.toFixed(1);
        const dist = h.distance || 0;
        const movTime = h.movingTime || 0;
        const totTime = h.totalTime || 0;
        const timeToUse = avgMode === 'moving' ? movTime : totTime;
        const avg = timeToUse > 0 ? (dist / timeToUse) : 0;
        const distStr = DISPLAY_UNITS === UNITS.mph ? (dist * 0.621371).toFixed(2) + ' mi' : dist.toFixed(2) + ' km';
        const avgStr = DISPLAY_UNITS === UNITS.mph ? (avg * 0.621371).toFixed(1) : avg.toFixed(1);

        return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px"
                     class="flex flex-col justify-center px-4 py-3 gap-2">
                  <div class="flex items-center justify-between">
                    <div class="text-xs font-semibold opacity-50">${date}</div>
                    <div class="flex gap-4 text-xs font-bold" style="font-family:'Rajdhani',sans-serif;font-size:0.85rem">
                      <span style="color:var(--green)">↑ ${max} ${DISPLAY_UNITS}</span>
                      <span style="color:var(--amber)">${distStr}</span>
                      <span style="color:var(--blue)">⌀ ${avgStr} ${DISPLAY_UNITS}</span>
                    </div>
                  </div>
                  <div class="flex justify-end gap-3 text-[0.65rem] opacity-60 font-medium tracking-wide">
                    <span>总计/Total: ${formatTime(totTime)}</span>
                    <span>运动/Moving: ${formatTime(movTime)}</span>
                  </div>
                </div>`;
      }).join('');
    }

    // ---- GPS handling ----
    function onPositionUpdate(pos) {
      const speedRaw = pos.coords.speed;
      if (speedRaw === null || isNaN(speedRaw)) return;

      const now = pos.timestamp || Date.now();
      let kmh = speedRaw * 3.6;

      // 1. Stationary check: accel says still → zero regardless of GPS
      if (accelMag < ACCEL_STILL_THRESHOLD) {
        kmh = 0;
      } else if (lastGpsTime > 0) {
        // 2. Spike rejection: if implied acceleration from GPS delta is implausible
        //    and the accelerometer doesn't support it, reject and keep last speed
        const dtSec = (now - lastGpsTime) / 1000;
        if (dtSec > 0 && dtSec < 10) {
          const impliedAccel = Math.abs(speedRaw - lastGpsSpeedMs) / dtSec;
          if (impliedAccel > MAX_ACCEL_FROM_GPS && accelMag < impliedAccel * 0.3) {
            kmh = lastGpsSpeedMs * 3.6; // reject spike, hold last valid speed
          }
        }
      }

      if (kmh < IGNORE_SPEED_BELOW) kmh = 0;

      // 3. Sustained motion gate: only confirm speed after moving for MOTION_CONFIRM_MS
      if (kmh > 0) {
        if (movingSinceMs === 0) movingSinceMs = now;
      } else {
        movingSinceMs = 0; // reset gate when stopped
      }
      const confirmedMoving = kmh > 0 && (now - movingSinceMs) >= MOTION_CONFIRM_MS;
      const displaySpeed = confirmedMoving ? kmh : 0;

      lastGpsSpeedMs = kmh / 3.6;
      const dtHours = (lastGpsTime > 0)
        ? Math.max(0, Math.min(now - lastGpsTime, 60000)) / 3600000
        : 0;
      lastGpsTime = now;
      currentSpeed = displaySpeed;

      const entry = getTodayEntry();
      if (currentSpeed > entry.maxSpeed) entry.maxSpeed = currentSpeed;
      if (currentSpeed > 0 && (entry.minSpeed === 0 || currentSpeed < entry.minSpeed)) entry.minSpeed = currentSpeed;

      if (dtHours > 0) {
        entry.totalTime = (entry.totalTime || 0) + dtHours;
        if (confirmedMoving) {
          entry.distance = (entry.distance || 0) + (kmh * dtHours);
          entry.movingTime = (entry.movingTime || 0) + dtHours;
        }
      }

      saveTodayEntry(entry);
      maxSpeed = entry.maxSpeed;
      minSpeed = entry.minSpeed;

      updateDisplay();
      renderHistory();
    }

    function onPositionError(err) {
      console.error('GPS error', err);
      if (err.code === err.PERMISSION_DENIED) showGpsPrompt();
    }

    // ---- Accelerometer (motion sensor for GPS drift defence) ----
    function startMotionSensor() {
      if (!window.DeviceMotionEvent) return;
      // iOS 13+ requires permission
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(state => {
          if (state === 'granted') window.addEventListener('devicemotion', onDeviceMotion);
        }).catch(() => {});
      } else {
        window.addEventListener('devicemotion', onDeviceMotion);
      }
    }
    function onDeviceMotion(e) {
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      // Remove gravity component magnitude approximation using high-pass isn't needed here;
      // we use acceleration (without gravity) if available, else fall back
      const acc = e.acceleration || a;
      const mag = Math.sqrt((acc.x||0)**2 + (acc.y||0)**2 + (acc.z||0)**2);
      // Low-pass smooth
      accelMag = ACCEL_ALPHA * mag + (1 - ACCEL_ALPHA) * accelMag;
    }

    // ---- Screen Wake Lock ----
    let wakeLock = null;
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => console.log('Screen Wake Lock released'));
          console.log('Screen Wake Lock active');
        } catch (err) {
          console.error('Wake lock error:', err);
        }
      }
    }
    
    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        await requestWakeLock();
      }
    });

    function startGps() {
      if (!('geolocation' in navigator)) { showGpsPrompt(); return; }
      requestWakeLock();
      startMotionSensor();
      const opts = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };
      watchId = navigator.geolocation.watchPosition(onPositionUpdate,
                                                  onPositionError, opts);
      isGpsActive = true;
      hideGpsPrompt();
    }
    function stopGps() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
        isGpsActive = false;
      }
      if (wakeLock !== null) {
        wakeLock.release().then(() => wakeLock = null);
      }
    }
    function showGpsPrompt() { gpsPrompt.classList.remove('hidden'); }
    function hideGpsPrompt() {
      gpsPrompt.classList.add('hidden');
      if (gpsDot) { gpsDot.classList.remove('off'); }
      if (gpsStatus) gpsStatus.textContent = 'GPS Active';
    }

    // ---- Fullscreen toggle ----
    function requestFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    // ---- Reset dialog handling ----
    let resetTarget = 'all';

    function showResetDialog(target) {
      resetTarget = target;
      if (target === 'distance') {
        document.getElementById('resetConfirmTitle').textContent = 'Reset Trip?';
        document.getElementById('resetConfirmText').textContent = 'This will reset your trip distance and average speed. Continue?';
      } else {
        document.getElementById('resetConfirmTitle').textContent = 'Reset Max Speed?';
        document.getElementById('resetConfirmText').textContent = 'This will reset today\'s max speed. Continue?';
      }
      resetConfirm.classList.remove('hidden');
    }

    function confirmResetDay() { showResetDialog('all'); }

    function executeReset() {
      const entry = getTodayEntry();
      if (resetTarget === 'distance') {
        entry.distance = 0;
        entry.movingTime = 0;
        entry.totalTime = 0;
      } else {
        entry.maxSpeed = 0;
        entry.minSpeed = 0;
        maxSpeed = 0;
        minSpeed = 0;
      }
      saveTodayEntry(entry);
      lastGpsTime = 0;
      lastGpsSpeedMs = 0;
      updateDisplay(); renderHistory();
      resetConfirm.classList.add('hidden');
    }

    // ---- Drawer (history) toggle ----
    let isDrawerOpen = false;
    drawerHeader.addEventListener('click', () => {
      isDrawerOpen = !isDrawerOpen;
      if (isDrawerOpen) {
        historyDrawer.style.maxHeight = 'calc(100vh - 120px)';
        drawerIcon.classList.add('rotate-180');
      } else {
        historyDrawer.style.maxHeight = '3rem';
        drawerIcon.classList.remove('rotate-180');
      }
    });

    // ======================  Initialization  ======================
    function init() {
      // ------- Correct geolocation‑permission query -------
      if (navigator.permissions && navigator.permissions.query) {
        navigator.permissions.query({ name: 'geolocation' }).then(result => {
          if (result.state === 'denied') showGpsPrompt();
          else startGps();
        }).catch(() => startGps()); // fallback if API not supported
      } else {
        startGps(); // older browsers
      }

      // ------- Load saved data for today -------
      const entry = getTodayEntry();
      if (entry) {
        maxSpeed = entry.maxSpeed || 0;
        minSpeed = entry.minSpeed || 0;
      }
      updateDisplay();
      renderHistory();
    }

    // ======================  Event Listeners  ======================
    requestGpsBtn.addEventListener('click', startGps);
    resetBtn.addEventListener('click', confirmResetDay);
    
    const resetDistanceBtn = document.getElementById('resetDistanceBtn');
    if (resetDistanceBtn) resetDistanceBtn.addEventListener('click', () => showResetDialog('distance'));
    
    if (avgLabel) {
      avgLabel.addEventListener('click', (e) => {
        e.stopPropagation();
        avgMode = avgMode === 'moving' ? 'total' : 'moving';
        if (avgLabelText) avgLabelText.textContent = avgMode === 'moving' ? 'Moving Avg' : 'Total Avg';
        updateDisplay();
        renderHistory();
      });
    }

    cancelReset.addEventListener('click', () => resetConfirm.classList.add('hidden'));
    confirmReset.addEventListener('click', executeReset);
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    if (fullscreenBtn) fullscreenBtn.addEventListener('click', requestFullscreen);

    // Run init once the DOM is ready
    document.addEventListener('DOMContentLoaded', init);
    window.addEventListener('beforeunload', stopGps);

    // ======================  F1 LED Theme  ======================
    const F1_BAR_COUNT = 15;
    const F1_GREEN_END = 9;   // cells 0-8 green
    const F1_AMBER_END = 12;  // cells 9-11 amber
    // cells 12-14 red

    const f1Bar = document.getElementById('f1Bar');
    const f1SpeedEl  = document.getElementById('f1Speed');
    const f1MaxEl    = document.getElementById('f1Max');
    const f1DistEl   = document.getElementById('f1Dist');
    const f1AvgEl    = document.getElementById('f1Avg');

    // Build LED cells
    const ledCells = [];
    for (let i = 0; i < F1_BAR_COUNT; i++) {
      const cell = document.createElement('div');
      cell.className = 'f1-bar-cell';
      f1Bar.appendChild(cell);
      ledCells.push(cell);
    }

    function updateF1(speed) {
      if (!f1SpeedEl) return;
      const pct = Math.min(speed / 140, 1);
      const lit = Math.round(pct * F1_BAR_COUNT);

      // LED bar
      ledCells.forEach((c, i) => {
        c.className = 'f1-bar-cell';
        if (i < lit) {
          if (i < F1_GREEN_END) c.classList.add('on-green');
          else if (i < F1_AMBER_END) c.classList.add('on-amber');
          else c.classList.add('on-red');
        }
      });

      // Big number — zero-padded 3 digits
      f1SpeedEl.textContent = String(Math.round(speed)).padStart(3, '0');

      // Mini stats
      const entry = getTodayEntry();
      const dist = entry.distance || 0;
      const movTime = entry.movingTime || 0;
      const totTime = entry.totalTime || 0;
      const timeToUse = avgMode === 'moving' ? movTime : totTime;
      const avg = timeToUse > 0 ? dist / timeToUse : 0;
      f1MaxEl.textContent  = Math.round(maxSpeed);
      f1DistEl.textContent = dist.toFixed(1);
      f1AvgEl.textContent  = Math.round(avg);
    }

    // Theme toggle
    let isF1 = false;
    document.getElementById('themeToggle').addEventListener('click', () => {
      isF1 = !isF1;
      document.body.classList.toggle('f1', isF1);
      document.getElementById('themeToggle').textContent = isF1 ? '🔵' : '🏎';
      if (isF1) updateF1(currentSpeed);
    });

    // Hook into updateDisplay to also refresh F1 panel
    const _origUpdateDisplay = updateDisplay;
    updateDisplay = function() {
      _origUpdateDisplay();
      if (isF1) updateF1(currentSpeed);
    };
  </script>
</body>
